<div class="form-container-main">
  <div class="form-card slide-up" style="--delay: 1">
    <div class="section-header">
      <div class="step-indicator">Welcome back</div>
      <h1 class="section-title">Login</h1>
      <p class="section-subtitle">Sign in to access the Sabhasad Master dashboard.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
      <div class="grid-form">
        <div class="form-group full-width">
          <label for="username" class="required">Username</label>
          <input type="text" id="username" formControlName="username" [class.invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" placeholder="Enter your username">
          <div class="error-message" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
            Username is required.
          </div>
        </div>

        <div class="form-group full-width">
          <label for="password" class="required">Password</label>
          <input type="password" id="password" formControlName="password" [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" placeholder="Enter your password">
          <div class="error-message" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            Password is required.
          </div>
        </div>

        <div class="form-footer full-width">
          <button type="submit" [disabled]="loginForm.invalid">Login</button>
        </div>
      </div>
    </form>

    <div class="alternate-action">
      Don't have an account? <a routerLink="/signup">Sign Up</a>
    </div>

    <div class="form-note error" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>
</div>
